<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haryad Digital Library | سیستمى بەڕێوەبردن</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --danger: #ef4444;
            --bg: #030712;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        header {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .credits { color: var(--accent); font-weight: bold; margin-top: 10px; }

        /* Admin Trigger Icon */
        .admin-trigger {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6);
            font-size: 24px;
            transition: 0.3s;
        }
        .admin-trigger:hover { transform: rotate(90deg) scale(1.1); }

        /* Main Grid */
        #mainContent {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px 100px 20px;
        }

        .category-card {
            height: 250px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
            overflow: hidden;
        }
        .category-card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .category-overlay {
            position: absolute;
            bottom: 0; width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            box-sizing: border-box;
        }

        /* Modal Settings */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #1e293b;
            width: 90%; max-width: 550px;
            border-radius: 25px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
        }

        .book-list-scroll {
            max-height: 450px;
            overflow-y: auto;
            padding: 20px;
        }

        .book-row {
            background: rgba(255,255,255,0.05);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Admin Panel Styles */
        #adminModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            color: #1e293b;
            padding: 30px;
            border-radius: 25px;
            z-index: 2100;
            width: 90%; max-width: 420px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        input, select, button {
            width: 100%; padding: 14px; margin: 10px 0;
            border-radius: 10px; border: 1px solid #ddd;
            font-size: 16px; box-sizing: border-box;
        }

        .admin-btn-main { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .admin-fields { display: none; }

        /* Delete Manager Styles */
        .manager-item {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }
        .del-cat-btn { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .del-book-btn { background: #feb2b2; color: #9b2c2c; border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .del-book-btn:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="admin-trigger" onclick="openAdmin()">⚙️</div>

<header>
    <h1>كتێبخانەی هاریاد خالید ✨</h1>
    <div class="credits">Created by: Haryad Khalid</div>
</header>

<div id="mainContent"></div>

<div class="modal-overlay" id="bookModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle"></h2>
            <span style="cursor:pointer; font-size:35px;" onclick="closeModal()">&times;</span>
        </div>
        <div class="book-list-scroll" id="modalBookList"></div>
    </div>
</div>

<div class="modal-overlay" id="adminOverlay" style="z-index: 2050;" onclick="closeAdmin()"></div>
<div id="adminModal">
    <h3 style="text-align:center; margin-top:0;">بەڕێوەبەرایەتی 🔒</h3>
    <input type="password" id="adminPass" placeholder="تێپەڕەوشە لێرە بنووسە..." oninput="checkPass()">
    
    <div class="admin-fields" id="adminFields">
        <p style="color:green; font-weight:bold; text-align:center; font-size:14px;">✓ وەرگیرا، دەتوانیت داتا بگۆڕیت</p>
        
        <label><b>زیادکردنی بەش:</b></label>
        <input type="text" id="catName" placeholder="ناوی بەش">
        <input type="text" id="catImg" placeholder="لینکی وێنەی پاشبنەما">
        <button class="admin-btn-main" onclick="addCategory()">دروستکردن</button>
        
        <hr>
        <label><b>زیادکردنی کتێب:</b></label>
        <select id="catSelect"></select>
        <input type="text" id="bookTitle" placeholder="ناوی کتێب">
        <input type="text" id="pdfLink" placeholder="لینکی PDF">
        <button class="admin-btn-main" style="background:#059669;" onclick="addBook()">پاشەکەوتکردن</button>
        
        <hr>
        <label><b>بەڕێوەبردنی سڕینەوە (کتێب و بەش):</b></label>
        <div id="deleteManager"></div>
        
        <button onclick="closeAdmin()" style="background:#64748b; color:white; margin-top:20px;">داخستن</button>
    </div>
</div>

<script>
    // --- 1. Background Particles Animation ---
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 1.5;
            this.sx = Math.random() * 0.4 - 0.2;
            this.sy = Math.random() * 0.4 - 0.2;
        }
        update() {
            this.x += this.sx; this.y += this.sy;
            if(this.x < 0 || this.x > canvas.width) this.sx *= -1;
            if(this.y < 0 || this.y > canvas.height) this.sy *= -1;
        }
        draw() { ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
    }
    for(let i=0; i<100; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- 2. Data Logic (Permanent Storage) ---
    let libraryData = JSON.parse(localStorage.getItem('library_db')) || [
        { name: "دینی", image: "https://images.unsplash.com/photo-1542810634-71277d95dcbb?w=500", books: [] },
        { name: "فەلسەفە", image: "https://images.unsplash.com/photo-1502139214982-d0ad755818d8?w=500", books: [] }
    ];

    function syncData() {
        localStorage.setItem('library_db', JSON.stringify(libraryData));
        renderUI();
        updateDeleteUI();
    }

    function renderUI() {
        const container = document.getElementById('mainContent');
        container.innerHTML = libraryData.map((cat, i) => `
            <div class="category-card" style="background-image: url('${cat.image}')" onclick="openModal(${i})">
                <div class="category-overlay">
                    <div style="font-size:1.4rem; font-weight:bold;">${cat.name} ✨</div>
                    <div style="font-size:13px; color:#ddd;">${cat.books.length} کتێب بەردەستە</div>
                </div>
            </div>
        `).join('');
    }

    function openModal(i) {
        const cat = libraryData[i];
        document.getElementById('modalTitle').innerText = cat.name;
        const list = document.getElementById('modalBookList');
        if(cat.books.length === 0) {
            list.innerHTML = `<p style="text-align:center; color:#888;">هیچ کتێبێک لەم بەشەدا نییە.</p>`;
        } else {
            list.innerHTML = cat.books.map(b => `
                <div class="book-row">
                    <span style="font-weight:bold;">📖 ${b.title}</span>
                    <a href="${b.link}" target="_blank" style="color:var(--primary); font-weight:bold; text-decoration:none;">خوێندنەوە</a>
                </div>
            `).join('');
        }
        document.getElementById('bookModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('bookModal').style.display = 'none'; }

    // --- 3. Admin & Delete Management ---
    function openAdmin() {
        document.getElementById('adminOverlay').style.display = 'block';
        document.getElementById('adminModal').style.display = 'block';
    }

    function closeAdmin() {
        document.getElementById('adminOverlay').style.display = 'none';
        document.getElementById('adminModal').style.display = 'none';
        document.getElementById('adminPass').value = '';
        document.getElementById('adminFields').style.display = 'none';
    }

    function checkPass() {
        // haryad123 = aGFyeWFkMTIz
        if(btoa(document.getElementById('adminPass').value) === "aGFyeWFkMTIz") {
            document.getElementById('adminFields').style.display = 'block';
            updateCatDropdown();
            updateDeleteUI();
        }
    }

    function updateCatDropdown() {
        document.getElementById('catSelect').innerHTML = libraryData.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    }

    function addCategory() {
        const name = document.getElementById('catName').value;
        const img = document.getElementById('catImg').value;
        if(name && img) {
            libraryData.push({ name, image: img, books: [] });
            syncData();
            updateCatDropdown();
            alert("بەشەکە بە سەرکەوتوویی دروستکرا!");
        }
    }

    function addBook() {
        const catName = document.getElementById('catSelect').value;
        const title = document.getElementById('bookTitle').value;
        const link = document.getElementById('pdfLink').value;
        const cat = libraryData.find(c => c.name === catName);
        if(cat && title) {
            cat.books.push({ title, link });
            syncData();
            alert(`کتێبی "${title}" زیادکرا!`);
        }
    }

    function updateDeleteUI() {
        const manager = document.getElementById('deleteManager');
        manager.innerHTML = libraryData.map((cat, ci) => `
            <div class="manager-item">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:8px; margin-bottom:8px;">
                    <b style="color:var(--primary);">📁 ${cat.name}</b>
                    <button class="del-cat-btn" onclick="delCat(${ci})">سڕینەوەی بەش</button>
                </div>
                <div>
                    ${cat.books.map((b, bi) => `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:13px;">
                            <span>• ${b.title}</span>
                            <button class="del-book-btn" onclick="delBook(${ci}, ${bi})">سڕینەوە</button>
                        </div>
                    `).join('') || '<span style="font-size:11px; color:#999;">کتێبی تێدا نییە</span>'}
                </div>
            </div>
        `).join('');
    }

    function delCat(i) { if(confirm("ئایا دڵنیای لە سڕینەوەی ئەم بەشە؟")) { libraryData.splice(i, 1); syncData(); updateCatDropdown(); } }
    function delBook(ci, bi) { if(confirm("ئایا دڵنیای لە سڕینەوەی ئەم کتێبە؟")) { libraryData[ci].books.splice(bi, 1); syncData(); } }

    renderUI();
</script>

</body>
</html>
