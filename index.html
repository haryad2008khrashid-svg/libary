<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتێبخانەی گەردونی | سیستەمی ڕیکلام و ئەدمین</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --bg: #030712;
            --text: #f8fafc;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* --- Full Screen Ad Popup --- */
        #autoAdOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center;
        }
        .ad-box { position: relative; width: 90%; max-width: 600px; text-align: center; }
        .ad-box img, .ad-box video { width: 100%; border-radius: 15px; box-shadow: 0 0 30px var(--accent); }
        .close-timer { position: absolute; top: -40px; right: 0; color: white; font-weight: bold; background: var(--accent); padding: 5px 15px; border-radius: 20px; }

        /* --- Layout --- */
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--primary); background: rgba(17,24,39,0.8); backdrop-filter: blur(10px); }
        #mainContent { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .category-card { height: 200px; border-radius: 15px; background-size: cover; position: relative; cursor: pointer; border: 1px solid #333; }
        .category-overlay { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, #000); border-radius: 0 0 15px 15px; box-sizing: border-box; }

        /* --- Admin Trigger --- */
        .admin-trigger {
            position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px;
            background: var(--primary); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; cursor: pointer; z-index: 1000;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5); font-size: 20px;
        }

        /* --- Modals --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: white; color: #222; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; }
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn { padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn-ad { background: var(--accent); color: black; max-width: 300px; display: block; margin: 20px auto; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="admin-trigger" onclick="openAdmin()">⚙️</div>

<div id="autoAdOverlay">
    <div class="ad-box" id="adBoxContent">
        <div class="close-timer" id="timerDisplay">چاوەڕێ بکە...</div>
    </div>
</div>

<header>
    <h1>كتێبخانەی گەردونی ✨</h1>
    <p>Created by: Haryad Khalid</p>
</header>

<button class="btn btn-ad" onclick="openOrderModal()">🚀 دەتەوێت لێرە ڕیکلام بکەیت؟</button>

<div id="mainContent"></div>

<div class="modal-overlay" id="adminModal">
    <div class="modal-content">
        <h3 style="text-align:center;">چوونە ژوورەوەی ئەدمین 🔒</h3>
        <input type="password" id="adminPass" placeholder="تێپەڕەوشە بنووسە...">
        <button class="btn" style="background:var(--primary); color:white;" onclick="checkLogin()">چوونە ژوورەوە</button>
        
        <div id="adminPanel" style="display:none; border-top: 1px solid #eee; margin-top: 15px; padding-top: 15px;">
            <h4>بەڕێوەبردنی داتا</h4>
            <input type="text" id="catName" placeholder="ناوی بەشی نوێ">
            <input type="text" id="catImg" placeholder="لینکی وێنەی بەش">
            <button class="btn" style="background:var(--accent);" onclick="addCategory()">زیادکردنی بەش</button>
            <hr>
            <button class="btn" style="background:#ef4444; color:white;" onclick="deleteAd()">سڕینەوەی ڕیکلامی ئێستا</button>
        </div>
        <button onclick="closeAdmin()" style="border:none; background:none; color:gray; width:100%; margin-top:10px; cursor:pointer;">داخستن</button>
    </div>
</div>

<div class="modal-overlay" id="orderModal">
    <div class="modal-content">
        <h3 style="text-align:center;">بڵاوکردنەوەی ڕیکلامی خێرا ⚡</h3>
        <input type="text" id="userAdMedia" placeholder="لینکی وێنە یان ڤیدیۆ">
        <input type="text" id="userAdTarget" placeholder="لینکی ئەپ یان سایت">
        <select id="userAdDuration">
            <option value="1">1 ڕۆژ (750 دینار)</option>
            <option value="7">1 هەفتە (5000 دینار)</option>
        </select>
        <p style="font-weight:bold; margin-bottom:5px;">پارە بنێرە بۆ: 07766924732</p>
        <a href="https://payment.fast-pay.cash/qr-pay?phone=07766924732" target="_blank" style="text-decoration:none;">
            <button class="btn" style="background:#e11d48; color:white;">FastPay</button>
        </a>
        <button class="btn" style="background:var(--primary); color:white; margin-top:15px;" onclick="publishUserAd()">بڵاوکردنەوەی ئێستا</button>
        <button onclick="closeOrderModal()" style="border:none; background:none; color:red; cursor:pointer; width:100%;">داخستن</button>
    </div>
</div>

<script>
    let libraryData = JSON.parse(localStorage.getItem('library_db')) || [
        { name: "فەلسەفە", image: "https://images.unsplash.com/photo-1502139214982-d0ad755818d8?w=500", books: [] }
    ];
    let activeAd = JSON.parse(localStorage.getItem('active_ad')) || null;

    window.onload = function() {
        renderUI();
        if (activeAd && (!activeAd.expireDate || Date.now() < activeAd.expireDate)) {
            showAutoAd();
        }
    };

    // --- Admin Logic ---
    function openAdmin() { document.getElementById('adminModal').style.display = 'flex'; }
    function closeAdmin() { 
        document.getElementById('adminModal').style.display = 'none'; 
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('adminPass').value = '';
    }
    
    function checkLogin() {
        // تێپەڕەوشە لێرە بگۆڕە: haryad123
        if(document.getElementById('adminPass').value === "haryad123") {
            document.getElementById('adminPanel').style.display = 'block';
            alert("بەخێربێیت ئەدمین!");
        } else {
            alert("تێپەڕەوشە هەڵەیە!");
        }
    }

    function addCategory() {
        const name = document.getElementById('catName').value;
        const img = document.getElementById('catImg').value;
        if(name && img) {
            libraryData.push({ name, image: img, books: [] });
            localStorage.setItem('library_db', JSON.stringify(libraryData));
            renderUI();
            alert("بەشەکە زیادکرا!");
        }
    }

    // --- Ad Logic ---
    function showAutoAd() {
        const overlay = document.getElementById('autoAdOverlay');
        const content = document.getElementById('adBoxContent');
        const timer = document.getElementById('timerDisplay');
        overlay.style.display = 'flex';

        let isVideo = activeAd.media.includes('.mp4');
        if (isVideo) {
            content.innerHTML += `<video id="adVideo" src="${activeAd.media}" autoplay muted playsinline></video>`;
            const v = document.getElementById('adVideo');
            v.onloadedmetadata = () => {
                let countdown = Math.ceil(v.duration);
                let int = setInterval(() => {
                    timer.innerText = `دادەخرێت دوای ${countdown} چرکە`;
                    countdown--;
                    if(countdown < 0) { clearInterval(int); closeAutoAd(); }
                }, 1000);
            };
        } else {
            content.innerHTML += `<img src="${activeAd.media}" onclick="window.open('${activeAd.target}')">`;
            let countdown = 5;
            let int = setInterval(() => {
                timer.innerText = `دادەخرێت دوای ${countdown} چرکە`;
                countdown--;
                if(countdown < 0) { clearInterval(int); closeAutoAd(); }
            }, 1000);
        }
    }

    function closeAutoAd() { document.getElementById('autoAdOverlay').style.display = 'none'; }
    
    function publishUserAd() {
        const media = document.getElementById('userAdMedia').value;
        const target = document.getElementById('userAdTarget').value;
        const days = parseInt(document.getElementById('userAdDuration').value);
        if(!media) return alert("لینکەکە دابنێ");
        activeAd = { media, target: target || "#", expireDate: Date.now() + (days * 24 * 60 * 60 * 1000) };
        localStorage.setItem('active_ad', JSON.stringify(activeAd));
        location.reload();
    }

    function deleteAd() {
        localStorage.removeItem('active_ad');
        alert("ڕیکلامەکە سڕایەوە.");
        location.reload();
    }

    function openOrderModal() { document.getElementById('orderModal').style.display = 'flex'; }
    function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }

    function renderUI() {
        const container = document.getElementById('mainContent');
        container.innerHTML = libraryData.map(cat => `
            <div class="category-card" style="background-image: url('${cat.image}')">
                <div class="category-overlay"><b>${cat.name}</b></div>
            </div>
        `).join('');
    }

    // Animation background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let p = [];
    for(let i=0; i<50; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5});
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        p.forEach(i => {
            i.x += 0.2; i.y += 0.2;
            if(i.x > canvas.width) i.x = 0;
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
