<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتێبخانەی گەردونی | وەشانی پێشکەوتوو</title>
    <style>
        :root { --primary: #6366f1; --accent: #f59e0b; --bg: #030712; --text: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        /* --- Full Screen Ad Popup --- */
        #autoAdOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999; justify-content: center; align-items: center;
        }
        .ad-box { position: relative; width: 95%; max-width: 800px; height: 80vh; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 0 50px var(--primary); }
        .ad-box iframe, .ad-box img, .ad-box video { width: 100%; height: 100%; object-fit: contain; border: none; }
        .close-timer { position: absolute; top: 15px; right: 15px; color: white; font-weight: bold; background: var(--accent); padding: 8px 20px; border-radius: 30px; z-index: 10000; }

        /* --- UI Elements --- */
        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--primary); background: rgba(17,24,39,0.8); backdrop-filter: blur(10px); }
        #mainContent { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .category-card { height: 200px; border-radius: 15px; background-size: cover; background-position: center; position: relative; cursor: pointer; border: 1px solid #333; }
        .category-overlay { position: absolute; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, #000); border-radius: 0 0 15px 15px; box-sizing: border-box; }

        /* --- Admin & Buttons --- */
        .admin-trigger { position: fixed; bottom: 20px; left: 20px; width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1000; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: white; color: #222; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        input, select, .btn { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-weight: bold; }
        .btn { cursor: pointer; border: none; }
        .btn-pay { background: #e11d48; color: white; }
        .btn-publish { background: var(--primary); color: white; opacity: 0.5; pointer-events: none; }
        .btn-active { opacity: 1 !important; pointer-events: auto !important; }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="admin-trigger" onclick="openModal('adminModal')">⚙️</div>

<div id="autoAdOverlay">
    <div class="close-timer" id="timerDisplay">5</div>
    <div class="ad-box" id="adBoxContent"></div>
</div>

<header>
    <h1>كتێبخانەی گەردونی ✨</h1>
    <p>Created by: Haryad Khalid</p>
</header>

<button class="btn" style="background:var(--accent); max-width:250px; display:block; margin:20px auto;" onclick="openModal('orderModal')">🚀 بڵاوکردنەوەی ڕیکلام</button>

<div id="mainContent"></div>

<div class="modal-overlay" id="adminModal">
    <div class="modal-content">
        <h3 style="text-align:center;">بەڕێوەبەرایەتی 🔒</h3>
        <input type="password" id="adminPass" placeholder="تێپەڕەوشە..." oninput="checkAdmin()">
        <div id="adminPanel" style="display:none; border-top:1px solid #eee; margin-top:10px; padding-top:10px;">
            <label><b>ڕیکلامی خێرا (بەبێ پارە):</b></label>
            <input type="text" id="adminAdLink" placeholder="لینکی ماڵپەڕ یان وێنە">
            <button class="btn" style="background:var(--accent);" onclick="publishAdminAd()">بڵاوکردنەوەی ڕیکلام</button>
            <hr>
            <button class="btn" style="background:#ef4444; color:white;" onclick="localStorage.removeItem('active_ad'); location.reload();">سڕینەوەی ڕیکلام</button>
        </div>
        <button class="btn" onclick="closeModal('adminModal')">داخستن</button>
    </div>
</div>

<div class="modal-overlay" id="orderModal">
    <div class="modal-content">
        <h3 style="text-align:center;">ڕیکلامی نوێ</h3>
        <input type="text" id="userAdLink" placeholder="لێرە لینکی ماڵپەڕەکەت دابنێ">
        <p style="font-size:12px; color:red;">* پێویستە سەرەتا پارەکە بنێریت بۆ ئەوەی دوگمەی بڵاوکردنەوە کار بکات.</p>
        
        <a href="https://payment.fast-pay.cash/qr-pay?phone=07766924732" target="_blank" onclick="enablePublish()">
            <button class="btn btn-pay">ناردنی پارە (FastPay)</button>
        </a>
        
        <button id="publishBtn" class="btn btn-publish" onclick="publishUserAd()">بڵاوکردنەوەی ئێستا</button>
        <button class="btn" onclick="closeModal('orderModal')">پاشگەزبوونەوە</button>
    </div>
</div>

<script>
    let libraryData = JSON.parse(localStorage.getItem('library_db')) || [
        { name: "فەلسەفە", image: "https://images.unsplash.com/photo-1502139214982-d0ad755818d8?w=500" },
        { name: "دینی", image: "https://images.unsplash.com/photo-1542810634-71277d95dcbb?w=500" }
    ];
    let activeAd = JSON.parse(localStorage.getItem('active_ad')) || null;

    window.onload = function() {
        renderUI();
        if (activeAd) { showAd(); }
    };

    function renderUI() {
        document.getElementById('mainContent').innerHTML = libraryData.map(cat => `
            <div class="category-card" style="background-image: url('${cat.image}')">
                <div class="category-overlay"><b>${cat.name}</b></div>
            </div>
        `).join('');
    }

    // --- Ad Display Logic ---
    function showAd() {
        const overlay = document.getElementById('autoAdOverlay');
        const content = document.getElementById('adBoxContent');
        const timerTxt = document.getElementById('timerDisplay');
        overlay.style.display = 'flex';

        // تێبینی: ئەگەر لینکەکە وێنە نەبوو، وەک Iframe پیشانی دەدات (ماڵپەڕ)
        if (activeAd.link.match(/\.(jpeg|jpg|gif|png|webp)$/) != null) {
            content.innerHTML = `<img src="${activeAd.link}">`;
        } else if (activeAd.link.includes('mp4')) {
            content.innerHTML = `<video src="${activeAd.link}" autoplay muted playsinline></video>`;
        } else {
            content.innerHTML = `<iframe src="${activeAd.link}"></iframe>`;
        }

        let count = 5;
        let countdown = setInterval(() => {
            count--;
            timerTxt.innerText = count;
            if(count <= 0) {
                clearInterval(countdown);
                overlay.style.display = 'none';
            }
        }, 1000);
    }

    // --- Admin & Logic ---
    function checkAdmin() {
        if(btoa(document.getElementById('adminPass').value) === "aGFyeWFkMTIz") {
            document.getElementById('adminPanel').style.display = 'block';
        }
    }

    function publishAdminAd() {
        const link = document.getElementById('adminAdLink').value;
        if(link) {
            activeAd = { link: link };
            localStorage.setItem('active_ad', JSON.stringify(activeAd));
            location.reload();
        }
    }

    function enablePublish() {
        document.getElementById('publishBtn').classList.add('btn-active');
    }

    function publishUserAd() {
        const link = document.getElementById('userAdLink').value;
        if(!link) return alert("لینکەکە دابنێ");
        activeAd = { link: link };
        localStorage.setItem('active_ad', JSON.stringify(activeAd));
        alert("بە سەرکەوتوویی بڵاوکرایەوە!");
        location.reload();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Particles Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let p = [];
    for(let i=0; i<50; i++) p.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5});
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        p.forEach(i => {
            i.y += 0.3; if(i.y > canvas.height) i.y = 0;
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(i.x, i.y, i.s, 0, Math.PI*2); ctx.fill();
        });
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
